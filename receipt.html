<script>
        document.addEventListener("DOMContentLoaded", function() {
            const receiptElement = document.getElementById("receipt");
            const orderReceipt = localStorage.getItem("orderReceipt");

            if (orderReceipt) {
                const data = JSON.parse(orderReceipt);
                receiptElement.innerHTML = `
                    <h2>Order Status: ${data.status}</h2>
                    <p>Message: ${data.message}</p>
                    <h3>Cart:</h3>
                    <pre>${JSON.stringify(data.cart, null, 2)}</pre>
                    <h3>User Token:</h3>
                    <p>${data.userToken}</p>
                `;
            } else {
                receiptElement.textContent = "No order receipt found.";
            }
        });
    </script>
